syntax = "proto3";

package common.v1;

import "google/protobuf/any.proto";

option go_package = "github.com/apexkit/gamekit/api/common/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.common.v1";
option java_outer_classname = "PolicyProtoV1";

// 打码量（wager）策略参数。
message WagerPolicyParams {
    double remaining_wager = 1;
    double balance_before_bet = 2;
}

// 运营商下注回调返回的 RTP 调控策略。
message BetPolicy {
    string id = 1;
    google.protobuf.Any params = 2;
}
