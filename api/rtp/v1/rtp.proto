syntax = "proto3";

package rtp.v1;

import "google/protobuf/timestamp.proto";
import "common/v1/policy.proto";

option go_package = "github.com/apexkit/gamekit/api/rtp/v1;v1";
option java_multiple_files = true;
option java_package = "dev.kratos.api.rtp.v1";
option java_outer_classname = "RtpProtoV1";

service RtpApi {
  // 获取spin
  rpc SelectSpin (SelectSpinRequest) returns (SelectSpinReply);

  // 获取玩家当前RTP(优先玩家->再按游戏->再按商户)
  rpc GetPlayerRtp (GetPlayerRtpRequest) returns (GetPlayerRtpReply);

  // 获取baccarat rtp
  rpc GetBaccaratRtp(GetBaccaratRtpRequest) returns (GetBaccaratRtpReply);

  // baccarat结算
  rpc SettleBaccarat(SettleBaccaratRequest) returns (SettleBaccaratReply);

  // baccarat重置库存（仅运营层面使用）
  rpc ResetBaccarat(ResetBaccaratRequest) returns (ResetBaccaratReply);

  // 重新训练并更新 slotopt 抽样权重（运营/运维主动触发，权重 Redis 缓存无过期）
  rpc RefreshSlotOptWeights(RefreshSlotOptWeightsRequest) returns (RefreshSlotOptWeightsReply);

  // 查询 slotopt 权重是否训练完成（RefreshSlotOptWeights 后轮询验证）
  rpc VerifySlotOptWeights(VerifySlotOptWeightsRequest) returns (VerifySlotOptWeightsReply);
}

message SelectSpinRequest{
    string appId = 1; //商户
    string playerId = 2; //账号id
    string gameBrand = 3; //游戏厂商
    string gameId = 4; //游戏id
    double bet = 5; //下注
    string round_model = 6; // 模式: DEFAULT,EXTRA,BUY
    string currency = 7;
    string mock = 8;
    string round_ext_model = 9; // 扩展模式.BUY的填值[1, 2, 3],EXTRA的填[1.5, 3]
    int64 spinId = 10;   //指定本局spin样本id
    string spinTableName = 11; //指定本局spin样本表名
    common.v1.BetPolicy policy = 12; // 运营商下注回调返回的 RTP 调控策略
}

message SelectSpinReply{
    int64 spinId = 1;   //spin样本id
    string gameBrand = 2; //游戏厂商
    string gameId = 3; //游戏id
    double bet = 4; //下注
    double originBet = 5;
    double originTotalWin = 6;
    bytes data = 7; // spin数据
    string round_model = 8; // 模式: DEFAULT,EXTRA,BUY
    string tableName = 9; //本次表名
    string rtp = 10;    // 本次rtp档位
    double rate = 11; // 本次spin的概率
    int32  compress = 12; // 压缩数据
    int64  nextId = 13; // 下一个样本id
    string groupId = 14; // 分组id
}

message GetPlayerRtpRequest{
    string appId = 1; //商户
    string playerId = 2; //账号id
    string gameBrand = 3; //游戏厂商
    string gameId = 4; //游戏id
}

message GetPlayerRtpReply{
    string rtp = 1;    // 本次rtp档位
}

message GetBaccaratRtpRequest{
    string appId = 1; //商户
    string gameBrand = 2; //游戏厂商
    string gameId = 3; //游戏id
    string roundId = 4; // 局id
    string rtp = 5;    // rtp档位
}

message GetBaccaratRtpReply{
    string rtp = 1;    // rtp档位
    double rate1 = 2;    // 1倍爆率
    double rate2 = 3;    // >=2倍爆率
}

message SettleBaccaratRequest{
    string appId = 1; //商户
    string gameBrand = 2; //游戏厂商
    string gameId = 3; //游戏id
    double roundBetTotal = 4; //本局下注总额
    double roundProfitTotal = 5; //本局平台本次盈利
    string roundId = 6; // 局id
    string rtp = 7;    // rtp档位
}

message SettleBaccaratReply{
}

message ResetBaccaratRequest{
    string appId = 1; //商户
    string gameBrand = 2; //游戏厂商
    string gameId = 3; //游戏id
    string rtp = 4;    // rtp档位
}

message ResetBaccaratReply{
}

message RefreshSlotOptWeightsRequest{
    string gameBrand = 1; // 游戏厂商
    string gameId = 2; // 游戏 id
    string round_model = 3; // 模式: DEFAULT, EXTRA, BUY
    string rtp = 4; // rtp 档位，如 "97"
    double bet = 5; // jili bet 分档游戏需传 bet，其他可传 0
}

message RefreshSlotOptWeightsReply{
    string cacheKey = 1; // 写入 Redis 的权重缓存 key
}

message VerifySlotOptWeightsRequest{
    string gameBrand = 1; // 游戏厂商
    string gameId = 2; // 游戏 id
    string round_model = 3; // 模式: DEFAULT, EXTRA, BUY
    string rtp = 4; // rtp 档位，如 "97"
    double bet = 5; // jili bet 分档游戏需传 bet，其他可传 0
}

enum SlotOptWeightsState {
    SLOT_OPT_WEIGHTS_STATE_UNSPECIFIED = 0;
    SLOT_OPT_WEIGHTS_STATE_NOT_FOUND = 1; // 无权重缓存
    SLOT_OPT_WEIGHTS_STATE_TRAINING = 2; // 训练中（持锁）
    SLOT_OPT_WEIGHTS_STATE_READY = 3; // 已就绪
}

message VerifySlotOptWeightsReply{
    SlotOptWeightsState state = 1; // 权重状态
    string cacheKey = 2; // Redis 权重缓存 key
    string baseTable = 3; // 普通 spin 表名（ready 时有值）
    string fsTable = 4; // freespin 表名（ready 时有值，可为空）
    double fsTrigger = 5; // freespin 触发概率（ready 时有值）
    int32 baseProbCount = 6; // 普通 spin 权重条目数
    int32 fsProbCount = 7; // freespin 权重条目数
}
